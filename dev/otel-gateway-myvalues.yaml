mode: daemonset
image:
  repository: otel/opentelemetry-collector-contrib

ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  jaeger-compact:
    enabled: false
  jaeger-grpc:
    enabled: false
  jaeger-thrift:
    enabled: false
  zipkin:
    enabled: false

extraVolumes:
  - name: varlogpods
    hostPath:
      path: /var/log/pods
      type: Directory

extraVolumeMounts:
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    filelog:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /var/log/pods/observability_*/*/*.log
      start_at: end
      include_file_path: true
      operators:
        - type: container
        - type: regex_parser
          parse_from: attributes["log.file.path"]
          regex: '^/var/log/pods/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<pod_uid>[0-9a-fA-F-]+)/(?P<container_name>[^/]+)/(?P<restart_count>\d+)\.log$'
        - type: move
          from: attributes.namespace
          to: resource["k8s.namespace.name"]
        - type: move
          from: attributes.pod_name
          to: resource["k8s.pod.name"]
        - type: move
          from: attributes.pod_uid
          to: resource["k8s.pod.uid"]
        - type: move
          from: attributes.container_name
          to: resource["k8s.container.name"]

  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 75
      spike_limit_percentage: 15
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.container.name
          - k8s.node.name
    batch: {}

  exporters:
    debug:
      verbosity: detailed
    azuremonitor:
      connection_string: "<APP_INSIGHTS_CONNECTION_STRING>"

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [debug, azuremonitor]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [debug, azuremonitor]
      logs:
        receivers: [otlp, filelog]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [azuremonitor]
