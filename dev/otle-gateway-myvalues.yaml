mode: deployment
image:
  repository: otel/opentelemetry-collector-contrib

ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  jaeger-compact:
    enabled: false
  jaeger-grpc:
    enabled: false
  jaeger-thrift:
    enabled: false
  zipkin:
    enabled: false

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 75
      spike_limit_percentage: 15
    batch: {}

  exporters:
    debug:
      verbosity: detailed
    azuremonitor:
      connection_string: "<APP_INSIGHTS_CONNECTION_STRING>"

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug, azuremonitor]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug, azuremonitor]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug, azuremonitor]
