# config-version: v1.0.1
# config-updated: 2026-07-05
mode: daemonset

serviceAccount:
  create: true
  name: otel-agent

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.154.0"

ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  jaeger-compact:
    enabled: false
  jaeger-grpc:
    enabled: false
  jaeger-thrift:
    enabled: false
  zipkin:
    enabled: false

resources:
  requests:
    cpu: 150m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP

extraVolumes:
  - name: otel-agent-client-tls
    secret:
      secretName: otel-agent-client-tls

extraVolumeMounts:
  - name: otel-agent-client-tls
    mountPath: /etc/otel/certs
    readOnly: true

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    prometheus:
      config:
        scrape_configs:
          - job_name: opentelemetry-collector
            scrape_interval: 10s
            static_configs:
              - targets:
                  - ${env:MY_POD_IP}:8888

  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 70
      spike_limit_percentage: 20
    k8s_attributes:
      auth_type: serviceAccount
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.deployment.name
          - k8s.node.name
    batch:
      timeout: 3s
      send_batch_size: 512
      send_batch_max_size: 1024

  exporters:
    otlp/gateway:
      endpoint: otel-gateway-opentelemetry-collector.observability.svc.cluster.local:4317
      tls:
        insecure: false
        ca_file: /etc/otel/certs/ca.crt
        cert_file: /etc/otel/certs/tls.crt
        key_file: /etc/otel/certs/tls.key
      timeout: 10s
      retry_on_failure:
        enabled: true
        initial_interval: 1s
        max_interval: 15s
        max_elapsed_time: 120s
      sending_queue:
        enabled: true
        num_consumers: 4
        queue_size: 5000

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8s_attributes, batch]
        exporters: [otlp/gateway]
      metrics:
        receivers: [otlp, prometheus]
        processors: [memory_limiter, k8s_attributes, batch]
        exporters: [otlp/gateway]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, k8s_attributes, batch]
        exporters: [otlp/gateway]
